name: Security Gates CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: "8.0.x"
  SOLUTION_PATH: backend/LMS.Security.slnx
  API_PROJECT: backend/src/LMS.API/LMS.API.csproj

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: BUILD & TEST
  # ─────────────────────────────────────────────
  build-and-test:
    name: Build & Test (.NET 8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build (Release)
        run: dotnet build ${{ env.SOLUTION_PATH }} --configuration Release --no-restore

      - name: Run tests
        run: |
          dotnet test ${{ env.SOLUTION_PATH }} \
            --configuration Release \
            --no-build \
            --verbosity normal \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: "**/TestResults/**/*.trx"

  # ─────────────────────────────────────────────
  # JOB 2: VULNERABILITY SCAN (Security Gate)
  # ─────────────────────────────────────────────
  vulnerability-scan:
    name: NuGet Vulnerability Scan
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Scan for vulnerable packages
        run: |
          dotnet list ${{ env.SOLUTION_PATH }} package --vulnerable --include-transitive 2>&1 | tee vuln-report.txt
          if grep -q "has the following vulnerable packages" vuln-report.txt; then
            echo "::error::SECURITY GATE FAILED — Vulnerable NuGet packages detected. See vuln-report.txt."
            exit 1
          fi

      - name: Upload vulnerability report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vulnerability-report
          path: vuln-report.txt

  # ─────────────────────────────────────────────
  # JOB 3: DATABASE MIGRATION (Aiven / Npgsql)
  # Skip nếu secret chưa được cấu hình
  # ─────────────────────────────────────────────
  deploy-database:
    name: EF Core Migration → Aiven (PostgreSQL)
    runs-on: ubuntu-latest
    needs: [build-and-test, vulnerability-scan]
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      secrets.AIVEN_DB_CONNECTION_STRING != ''

    env:
      ConnectionStrings__DefaultConnection: ${{ secrets.AIVEN_DB_CONNECTION_STRING }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Install EF Core CLI tools (phải khớp version .NET 8)
        run: dotnet tool install --global dotnet-ef --version 8.*

      - name: Apply EF Core migrations
        working-directory: backend
        run: |
          dotnet ef database update \
            --project src/LMS.Infrastructure/LMS.Infrastructure.csproj \
            --startup-project src/LMS.API/LMS.API.csproj \
            --configuration Release

  # ─────────────────────────────────────────────
  # JOB 4: DEPLOY FRONTEND (Vercel)
  # ─────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    needs: [build-and-test, vulnerability-scan]
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      secrets.VERCEL_TOKEN != ''

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy to Vercel (Production)
        working-directory: frontend
        run: |
          vercel deploy --prod \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --yes

  # ─────────────────────────────────────────────
  # JOB 5: DEPLOY BACKEND (Render)
  # Chạy độc lập — không block bởi migration
  # ─────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → Render
    runs-on: ubuntu-latest
    needs: [build-and-test, vulnerability-scan]
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      secrets.RENDER_DEPLOY_HOOK_URL != ''

    steps:
      - name: Trigger Render deploy hook
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            --fail \
            --silent \
            --show-error
